# Recipe Agent 配置文件

app:
  name: Recipe Agent
  version: 0.1.0
  debug: false

database:
  type: postgres
  host: localhost
  port: 5432
  name: recipe_agent

redis:
  host: localhost
  port: 6379
  db: 0

llm:
  provider: deepseek
  model: deepseek-v3
  temperature: 0.7
  max_tokens: 2000

vector_db:
  type: chroma
  persist_directory: ./data/vectors

storage:
  type: local
  path: ./data/storage

logging:
  level: INFO
  format: "%(asctime)s - %(name)s - %(levelname)s - %(message)s"
